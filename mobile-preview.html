<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobilní náhled | Auto Sosnovec</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      color: #f6f7f9;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 22% 10%, rgba(201, 23, 34, 0.18), transparent 34%),
        linear-gradient(135deg, #101216, #050506 70%);
    }

    .preview-shell {
      width: min(100%, 460px);
      display: grid;
      gap: 16px;
      justify-items: center;
    }

    .preview-title {
      width: 100%;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.15;
    }

    p {
      margin: 4px 0 0;
      color: #b9bec7;
      font-size: 0.88rem;
    }

    .size-label {
      flex: 0 0 auto;
      padding: 7px 10px;
      color: #ffffff;
      font-size: 0.78rem;
      font-weight: 700;
      background: #c91722;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 20px rgba(201, 23, 34, 0.2);
    }

    .phone-frame {
      width: min(100%, 414px);
      aspect-ratio: 414 / 896;
      padding: 14px;
      background:
        linear-gradient(145deg, #2d3138, #08090b 58%, #1b1e24);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 34px;
      box-shadow:
        0 42px 90px rgba(0, 0, 0, 0.54),
        0 16px 34px rgba(0, 0, 0, 0.36),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.3);
    }

    iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      background: #101216;
    }

    @media (max-width: 520px) {
      body {
        padding: 14px;
      }

      .preview-title {
        align-items: start;
        flex-direction: column;
      }

      .phone-frame {
        border-radius: 26px;
        padding: 10px;
      }

      .phone-screen {
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="preview-shell">
    <div class="preview-title">
      <div>
        <h1>Mobilní náhled webu</h1>
        <p>Simulace telefonu, obsah se načítá z index.html.</p>
      </div>
      <span class="size-label">414 × 896 px</span>
    </div>

    <div class="phone-frame" aria-label="Mobilní náhled">
      <div class="phone-screen">
        <iframe src="index.html" title="Mobilní náhled Auto Sosnovec"></iframe>
      </div>
    </div>
  </main>
</body>
</html>
